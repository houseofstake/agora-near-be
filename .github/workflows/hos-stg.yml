name: Deploy HOS Staging

on:
  workflow_dispatch: # This allows the workflow to be manually triggered from the GitHub UI

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: hos-staging

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud using OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{vars.GCP_PROJECT_NUMBER}}/locations/global/workloadIdentityPools/github-identity-pool/providers/github
          service_account: ${{vars.GCP_SA_EMAIL}}

      - name: Configure gcloud
        run: gcloud config set project ${{vars.GCP_PROJECT_ID}}

      - name: Login to Artifact Registry
        run: gcloud auth configure-docker ${{vars.GCP_REGION}}-docker.pkg.dev

      - name: Build Docker image
        run: docker build -t ${{vars.GCP_DOCKER_IMAGE}} .

      - name: Push Docker image to Artifact Registry
        run: docker push ${{vars.GCP_DOCKER_IMAGE}}

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy near-api \
            --image ${{vars.GCP_DOCKER_IMAGE}} \
            --region ${{vars.GCP_REGION}}

      - name: Build and push voting power sync job image
        run: |
          docker build -f Dockerfile.job -t ${{vars.GCP_DOCKER_IMAGE}}-job .
          docker push ${{vars.GCP_DOCKER_IMAGE}}-job

      - name: Deploy voting power sync Cloud Run Job
        run: |
          gcloud run jobs deploy sync-voting-power \
            --image ${{vars.GCP_DOCKER_IMAGE}}-job \
            --region ${{vars.GCP_REGION}} \
            --set-secrets=DATABASE_URL=DATABASE_URL:latest,FASTNEAR_API_KEY=FASTNEAR_API_KEY:latest \
            --service-account=near-api@${{vars.GCP_PROJECT_ID}}.iam.gserviceaccount.com \
            --vpc-connector=projects/${{vars.GCP_PROJECT_ID}}/locations/${{vars.GCP_REGION}}/connectors/vpc-connector \
            --vpc-egress=private-ranges-only \
            --max-retries=1 \
            --task-timeout=300s
